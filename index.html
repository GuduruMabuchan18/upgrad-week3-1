<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive To-Do List</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 400px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px 10px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            margin-top: 5px;
            background: #eee;
            border-radius: 4px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px;
        }

        .counts {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button id="addTask">Add</button>

    <ul id="taskList"></ul>

    <div class="counts">
        Total Tasks: <span id="totalCount">0</span> |
        Completed: <span id="completedCount">0</span>
    </div>
</div>

<script>
$(document).ready(function() {

    function updateCounts() {
        let total = $("#taskList li").length;
        let completed = $("#taskList li.completed").length;

        $("#totalCount").text(total);
        $("#completedCount").text(completed);
    }

    // Add task
    $("#addTask").on("click", function() {

        let taskText = $("#taskInput").val().trim();

        if(taskText === "") return;

        let newTask = `
            <li>
                <span class="task-text">${taskText}</span>
                <button class="delete-btn">Delete</button>
            </li>
        `;

        $("#taskList").append(newTask);
        $("#taskInput").val("");

        updateCounts();
    });

    // Mark complete (event delegation)
    $("#taskList").on("click", ".task-text", function() {
        $(this).parent().toggleClass("completed");
        updateCounts();
    });

    // Delete task (event delegation)
    $("#taskList").on("click", ".delete-btn", function() {
        $(this).parent().remove();
        updateCounts();
    });

});
</script>

</body>
</html>
